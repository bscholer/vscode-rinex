name: Release

# Tag a version to build and publish the .vsix:
#   npm version patch && git push --follow-tags
# (or: git tag v0.1.1 && git push origin v0.1.1)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm test

      - name: Check tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Package
        run: npx --yes @vscode/vsce package -o "rinex-tools-${GITHUB_REF_NAME#v}.vsix"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "rinex-tools-${GITHUB_REF_NAME#v}.vsix" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
